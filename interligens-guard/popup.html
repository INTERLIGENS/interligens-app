<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTERLIGENS Guard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 200px;
      background: #000;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1a1a24;
    }
    .header .logo { color: #FF6B00; font-weight: 800; font-size: 14px; letter-spacing: 1px; }
    .header .guard { color: #666; font-size: 12px; }

    .score-section { text-align: center; margin-bottom: 16px; }
    .verdict-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #000;
      letter-spacing: 1px;
    }
    .score-number {
      font-size: 48px;
      font-weight: 800;
      line-height: 1.1;
      margin-top: 6px;
    }
    .score-sub { font-size: 16px; color: #666; }
    .token-name { font-size: 12px; color: #888; margin-top: 4px; }

    .section-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .signals { margin-bottom: 14px; }
    .signal-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 12px;
      color: #ccc;
    }
    .signal-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .signal-sev { font-size: 9px; font-weight: 600; margin-left: auto; white-space: nowrap; }

    .sources { margin-bottom: 14px; }
    .source-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .source-tag {
      font-size: 10px;
      color: #999;
      background: #111118;
      border: 1px solid #222;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .casefile-link {
      display: block;
      text-align: center;
      color: #FF6B00;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      padding: 8px;
      border-top: 1px solid #1a1a24;
      margin-top: 8px;
    }
    .casefile-link:hover { text-decoration: underline; }

    .manual-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1a1a24;
    }
    .manual-input {
      width: 100%;
      background: #111118;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 10px;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      outline: none;
      margin-bottom: 8px;
    }
    .manual-input::placeholder { color: #555; }
    .scan-btn {
      width: 100%;
      background: #FF6B00;
      color: #000;
      font-weight: 700;
      font-size: 12px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: monospace;
    }
    .scan-btn:disabled { background: #994000; cursor: wait; }

    .empty-state { text-align: center; color: #555; padding: 20px 0; font-size: 12px; }

    .footer {
      margin-top: 16px;
      padding-top: 10px;
      border-top: 1px solid #111;
      text-align: center;
      font-size: 9px;
      color: #333;
    }
    .footer a { color: #444; text-decoration: none; }
    .footer a:hover { color: #888; }

    .error-msg { color: #FF3B5C; font-size: 11px; text-align: center; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">INTERLIGENS</span>
    <span class="guard">GUARD</span>
  </div>

  <div id="content">
    <div class="empty-state" id="empty-state">
      Checking active tab...
    </div>
  </div>

  <div class="manual-section">
    <input
      type="text"
      id="manual-input"
      class="manual-input"
      placeholder="Paste a Solana mint address"
    />
    <button id="scan-btn" class="scan-btn">SCAN</button>
    <div id="error-msg" class="error-msg" style="display:none"></div>
  </div>

  <div class="footer">
    Powered by <a href="https://app.interligens.com" target="_blank" rel="noopener noreferrer">INTERLIGENS</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
