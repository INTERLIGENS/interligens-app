<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTERLIGENS Widget — Test Page</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
      margin: 0;
    }
    h1 { font-size: 18px; color: #FF6B00; letter-spacing: 0.1em; margin: 0; }
    .row { display: flex; gap: 40px; align-items: flex-start; }
    .demo-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .demo-label { font-size: 11px; color: #666; }
    .iframe-demo { border: 1px solid #222; border-radius: 8px; overflow: hidden; }
  </style>
</head>
<body>
  <h1>INTERLIGENS WIDGET TEST</h1>
  <p style="color:#666;font-size:12px;margin:0">Set data-partner-key on the script tag with your real key to test live data.</p>

  <!-- ── Embed script (standalone, no React) ─────────────────── -->
  <!-- In production: src="https://app.interligens.com/widget/embed.js" -->
  <script src="../dist/embed.js" data-partner-key="test_key_replace_me" defer></script>

  <div class="row">
    <!-- WIF token — expected GREEN -->
    <div class="demo-block">
      <div data-interligens-widget
           data-address="EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm"
           data-size="120"></div>
      <span class="demo-label">WIF (SOL)</span>
    </div>

    <!-- BOTIFY — expected RED -->
    <div class="demo-block">
      <div data-interligens-widget
           data-address="BYZ9CcZGKAXmN2uDsKcQMM9UnZacja4vWcns9Th69xb"
           data-size="120"></div>
      <span class="demo-label">BOTIFY (SOL)</span>
    </div>

    <!-- ETH address -->
    <div class="demo-block">
      <div data-interligens-widget
           data-address="0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
           data-size="120"></div>
      <span class="demo-label">Vitalik (ETH)</span>
    </div>

    <!-- Small size variant -->
    <div class="demo-block">
      <div data-interligens-widget
           data-address="EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm"
           data-size="80"></div>
      <span class="demo-label">WIF small (80px)</span>
    </div>
  </div>

  <!-- ── iframe fallback ────────────────────────────────────────── -->
  <div class="demo-block">
    <span class="demo-label">iframe fallback (replace ADDRESS and KEY in URL)</span>
    <iframe
      class="iframe-demo"
      src="https://app.interligens.com/widget/iframe?address=EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm&key=YOUR_PARTNER_KEY"
      width="160"
      height="180"
      frameborder="0"
      scrolling="no"
      allowtransparency="true"
    ></iframe>
  </div>
</body>
</html>
